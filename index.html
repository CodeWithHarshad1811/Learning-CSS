<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selectors</title>

    <style>
        #first{color: chocolate;}
        #second{color: blue;}
    </style>
    
    <!--Element Selector
    <style>
        h1{color: yellow;}
    </style>

    --Universal Selector--
<style>
    *{
        color: darkviolet;
    }
</style>

-->
</head>
<body>   <!--
   --Element Selector--
    <h1>This is Heading</h1>
    <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Inventore, maiores.</p>
<hr>

    --Universal Selector--

<p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Saepe, porro.</p>

-->

<div id="first"><h1>This is First Heading</h1>  </div>
<div id="second"><h2>This is second Heading</h2></div>


<p id="first">Lorem ipsum dolor sit amet consectetur adipisicing elit. Minima, soluta.</p>
</body>
</html>
